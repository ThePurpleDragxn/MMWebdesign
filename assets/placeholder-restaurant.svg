<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Restaurantfoto Platzhalter</title>
  <desc id="desc">Illustrative Restaurantdarstellung ohne externe Bilddienste.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#241710"/>
      <stop offset="100%" stop-color="#3a2618"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6c07c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c77745" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <ellipse cx="700" cy="770" rx="490" ry="110" fill="#130c08"/>
  <g fill="url(#warm)">
    <rect x="220" y="210" width="960" height="500" rx="30"/>
    <rect x="290" y="285" width="360" height="160" rx="18"/>
    <rect x="760" y="285" width="350" height="90" rx="14"/>
    <rect x="760" y="395" width="350" height="90" rx="14"/>
    <rect x="760" y="505" width="350" height="90" rx="14"/>
  </g>
  <g fill="#f5d1a6" opacity="0.85">
    <circle cx="370" cy="330" r="14"/>
    <circle cx="410" cy="330" r="14"/>
    <circle cx="450" cy="330" r="14"/>
  </g>
</svg>
